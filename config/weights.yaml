# ── Vera Engine — Scoring Weights ─────────────────────────────────────────────
# All weights within a global/category block MUST sum to 1.0 (tolerance ±0.001).
# Verified at startup by ConfigValidator.
# Implemented in Phase 6 (Weighted Scoring Engine).

# Global defaults — applied to all categories unless overridden
global:
  specificity:           0.25
  category_fit:          0.20
  merchant_fit:          0.20
  trigger_relevance:     0.20
  engagement_compulsion: 0.10
  language_match:        0.05

# Category-level overrides (replaces global for the named category)
category_overrides:
  dentists:
    specificity:           0.30
    category_fit:          0.25
    merchant_fit:          0.20
    trigger_relevance:     0.15
    engagement_compulsion: 0.05
    language_match:        0.05

  salons:
    specificity:           0.20
    category_fit:          0.15
    merchant_fit:          0.25
    trigger_relevance:     0.20
    engagement_compulsion: 0.15
    language_match:        0.05

  restaurants:
    specificity:           0.25
    category_fit:          0.15
    merchant_fit:          0.20
    trigger_relevance:     0.20
    engagement_compulsion: 0.15
    language_match:        0.05

  gyms:
    specificity:           0.20
    category_fit:          0.20
    merchant_fit:          0.25
    trigger_relevance:     0.20
    engagement_compulsion: 0.10
    language_match:        0.05

  pharmacies:
    specificity:           0.35
    category_fit:          0.20
    merchant_fit:          0.15
    trigger_relevance:     0.25
    engagement_compulsion: 0.00
    language_match:        0.05

# Trigger-kind overrides (additive delta applied on top of category weights)
trigger_overrides:
  research_digest:
    specificity: +0.05
    trigger_relevance: +0.05
    engagement_compulsion: -0.05
    language_match: -0.05

  supply_alert:
    specificity: +0.10
    trigger_relevance: +0.10
    engagement_compulsion: -0.10
    language_match: -0.10

  active_planning_intent:
    merchant_fit: +0.10
    engagement_compulsion: +0.05
    specificity: -0.05
    language_match: -0.10

  regulation_change:
    specificity: +0.05
    trigger_relevance: +0.10
    engagement_compulsion: -0.05
    language_match: -0.10

  curious_ask_due:
    engagement_compulsion: +0.10
    merchant_fit: +0.05
    specificity: -0.10
    language_match: -0.05

  recall_due:
    merchant_fit: +0.05
    language_match: +0.10
    specificity: -0.05
    trigger_relevance: -0.10

# Compulsion lever bonuses (added to engagement_compulsion dimension score)
lever_bonuses:
  social_proof:       0.10
  asking_merchant:    0.10
  loss_aversion:      0.08
  reciprocity:        0.07
  specificity:        0.06
  curiosity:          0.05
  single_binary_cta:  0.05

# Goal → lever affinity (used by CandidateGenerator to pick compulsion foci).
# Keys are vera.goals.goal_context.CANONICAL_GOALS — the 8-goal taxonomy
# GoalInferenceEngine (Phase 5) actually produces. Each goal lists its
# levers strongest-fit-first; CandidateGenerator takes the top N to
# produce that many differently-angled candidates for the same goal.
goal_lever_affinity:
  RECOVER_REVENUE:      [loss_aversion, specificity, reciprocity]
  WIN_BACK_CUSTOMERS:   [reciprocity, curiosity, loss_aversion]
  REDUCE_CHURN:         [reciprocity, asking_merchant, curiosity]
  PROMOTE_OFFERS:       [specificity, loss_aversion, social_proof]
  IMPROVE_LISTINGS:     [loss_aversion, specificity, reciprocity]
  COLLECT_REVIEWS:      [social_proof, reciprocity, asking_merchant]
  INCREASE_SALES:       [loss_aversion, social_proof, specificity]
  INCREASE_VISIBILITY:  [social_proof, specificity, curiosity]
