# Category-specific templates — Restaurants & Cafes.
# Voice: warm_busy_practical / fellow_operator — direct, operator-to-
# operator, no fluff (magicpin-ai-challenge/dataset/categories/restaurants.json).
# Vocabulary from vocab_allowed (footfall, covers, AOV, table turnover,
# reservations, ...); avoids vocab_taboo (best food in city, guaranteed
# packed house, miracle marketing, viral guarantee).
templates:
  - id: restaurants_recover_revenue_loss_aversion
    goal: RECOVER_REVENUE
    category: restaurants
    levers: [loss_aversion, specificity]
    cta_type: open_ended
    required_slots: [metric_label, metric_delta_pct]
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, {{ metric_label }}
        is down {{ metric_delta_pct | abs_pct }} this week{% if peer_avg_ctr %} —
        peer restaurants in {{ locality }} are converting profile views at
        {{ peer_avg_ctr | pct }}{% endif %}. Before it costs you covers,
        want me to check what's driving it?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, is hafte
        {{ metric_label }} {{ metric_delta_pct | abs_pct }} kam hua
        hai{% if peer_avg_ctr %} — {{ locality }} ke peer restaurants
        {{ peer_avg_ctr | pct }} pe convert kar rahe hain{% endif %}.
        Covers pe asar padne se pehle, wajah check kar loon?

  - id: restaurants_win_back_customers_reciprocity
    goal: WIN_BACK_CUSTOMERS
    category: restaurants
    levers: [reciprocity, loss_aversion]
    cta_type: binary
    required_slots: [customer_name]
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, {{ customer_name }}
        hasn't ordered in a while{% if days_since_last_visit %}
        ({{ days_since_last_visit }} days){% endif %} — that's a repeat
        diner at risk of going to a competitor. I've drafted a check-in
        {% if active_offer_title %}with your {{ active_offer_title }}
        offer{% endif %} — just say go and I'll send it.
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, {{ customer_name }}
        ne kaafi din se order nahi kiya{% if days_since_last_visit %}
        ({{ days_since_last_visit }} din){% endif %} — repeat diner
        competitor ke paas ja sakta hai. Maine check-in taiyar kar diya
        hai{% if active_offer_title %} {{ active_offer_title }} offer ke
        saath{% endif %} — 'go' bolein, bhej deti hoon.

  - id: restaurants_reduce_churn_asking_merchant
    goal: REDUCE_CHURN
    category: restaurants
    levers: [asking_merchant, reciprocity]
    cta_type: open_ended
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if days_since_last_touch %},
        it's been {{ days_since_last_touch }} days since we last
        spoke{% endif %} and I don't want to keep pinging without being
        useful — quick one instead: is your covers mix leaning more
        dine-in or delivery this month? I'll tailor what I send around
        that.
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if days_since_last_touch %},
        {{ days_since_last_touch }} din ho gaye baat kiye{% endif %}, aur
        bina kaam ki cheez ke ping nahi karna chahti — iske bajaye ek
        chhota sawaal: is mahine covers zyada dine-in se aa rahe hain ya
        delivery se? Uske hisaab se hi bhejungi.

  - id: restaurants_promote_offers_specificity
    goal: PROMOTE_OFFERS
    category: restaurants
    levers: [specificity, loss_aversion]
    cta_type: binary
    required_slots: [inventory_health]
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, you have no
        live offer right now{% if suggested_offer_title %} —
        {{ suggested_offer_title }} usually drives the strongest new-diner
        AOV{% endif %}. Want me to activate it today?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, abhi koi
        live offer nahi hai{% if suggested_offer_title %} —
        {{ suggested_offer_title }} naye diners ke liye sabse strong AOV
        laata hai{% endif %}. Aaj activate kar doon?

  - id: restaurants_improve_listings_loss_aversion
    goal: IMPROVE_LISTINGS
    category: restaurants
    levers: [loss_aversion, specificity]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, your profile
        is {% if not verified %}unverified{% else %}missing
        {{ missing_fields | join(' and ') if missing_fields else 'a few details' }}{% endif %} —
        that's likely costing you footfall from nearby searches. Want me
        to fix it now?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, aapki
        profile {% if not verified %}unverified{% else %}
        {{ missing_fields | join(' aur ') if missing_fields else 'kuch details' }} mein
        incomplete{% endif %} hai — isse footfall kam ho raha hoga. Abhi
        theek kar doon?

  - id: restaurants_collect_reviews_social_proof
    goal: COLLECT_REVIEWS
    category: restaurants
    levers: [social_proof, reciprocity]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, your reviews
        are trending positive{% if top_review_theme %} — diners keep
        mentioning {{ top_review_theme }}{% endif %}. I've drafted a GBP
        post around that — want me to publish it?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, reviews
        positive trend mein hain{% if top_review_theme %} — diners baar
        baar {{ top_review_theme }} ka zikar karte hain{% endif %}. Maine
        ek GBP post taiyar kar diya hai — publish kar doon?

  - id: restaurants_increase_sales_specificity
    goal: INCREASE_SALES
    category: restaurants
    levers: [specificity, loss_aversion]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }},
        {% if festival_days_until %}festival-season covers pick up in the
        next {{ festival_days_until }} days{% else %}your weekend covers
        typically run highest for {{ category_slug }} in
        {{ locality }}{% endif %} — restaurants without a fresh post tend
        to miss the window. Want me to schedule one?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }},
        {% if festival_days_until %}agle {{ festival_days_until }} din mein
        festival-season covers badhte hain{% else %}weekend covers
        {{ category_slug }} ke liye {{ locality }} mein sabse zyada hote
        hain{% endif %} — bina fresh post ke restaurants yeh window miss
        kar dete hain. Ek post schedule kar doon?

  - id: restaurants_increase_visibility_specificity
    goal: INCREASE_VISIBILITY
    category: restaurants
    levers: [specificity, social_proof]
    cta_type: open_ended
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if digest_title %},
        this week's trend: {{ digest_title }}{% if digest_source %}
        ({{ digest_source }}){% endif %}{% else %}, your profile views
        moved {{ views_delta_pct | pct(signed=true) }} this
        week{% endif %} — want the details?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if digest_title %},
        is hafte ka trend: {{ digest_title }}{% if digest_source %}
        ({{ digest_source }}){% endif %}{% else %}, is hafte views
        {{ views_delta_pct | pct(signed=true) }} badle hain{% endif %} —
        details chahiye?
