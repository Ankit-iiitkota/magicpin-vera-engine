# Category-specific templates — Salons & Beauty.
# Voice: warm_practical / approachable_expert (magicpin-ai-challenge/dataset/categories/salons.json).
# Vocabulary from vocab_allowed (balayage, keratin, hair spa, threading,
# waxing, ...); avoids vocab_taboo (guaranteed glow, permanent results,
# instant transformation, miracle, best in city).
templates:
  - id: salons_recover_revenue_loss_aversion
    goal: RECOVER_REVENUE
    category: salons
    levers: [loss_aversion, specificity]
    cta_type: open_ended
    required_slots: [metric_label, metric_delta_pct]
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, {{ metric_label }}
        is down {{ metric_delta_pct | abs_pct }} this week{% if peer_avg_ctr %} —
        salons in {{ locality }} are converting profile views at
        {{ peer_avg_ctr | pct }}{% endif %}. Before it eats into your chair
        bookings, want me to see what changed?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, is hafte
        {{ metric_label }} {{ metric_delta_pct | abs_pct }} kam hua
        hai{% if peer_avg_ctr %} — {{ locality }} ke salons
        {{ peer_avg_ctr | pct }} pe convert kar rahe hain{% endif %}.
        Bookings pe asar padne se pehle, dekh loon kya wajah hai?

  - id: salons_win_back_customers_reciprocity
    goal: WIN_BACK_CUSTOMERS
    category: salons
    levers: [reciprocity, curiosity]
    cta_type: binary
    required_slots: [customer_name]
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, {{ customer_name }}
        hasn't booked in a while{% if days_since_last_visit %}
        ({{ days_since_last_visit }} days){% endif %}. I've drafted a
        friendly check-in{% if active_offer_title %} with your
        {{ active_offer_title }} offer{% endif %} — just say go and I'll
        send it.
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, {{ customer_name }}
        kaafi din se book nahi kiya{% if days_since_last_visit %}
        ({{ days_since_last_visit }} din){% endif %}. Maine ek friendly
        check-in taiyar kar diya hai{% if active_offer_title %} aapke
        {{ active_offer_title }} offer ke saath{% endif %} — 'go' bolein,
        bhej deti hoon.

  - id: salons_reduce_churn_asking_merchant
    goal: REDUCE_CHURN
    category: salons
    levers: [asking_merchant, reciprocity]
    cta_type: open_ended
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if days_since_last_touch %},
        it's been {{ days_since_last_touch }} days since we last
        spoke{% endif %} and I don't want to keep pinging without being
        useful — quick one instead: is your client mix leaning more
        colour/balayage or cut-and-style this month? I'll tailor what I
        send around that.
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if days_since_last_touch %},
        {{ days_since_last_touch }} din ho gaye baat kiye{% endif %}, aur
        bina kaam ki cheez ke ping nahi karna chahti — iske bajaye ek
        chhota sawaal: is mahine clients zyada colour/balayage ke liye aa
        rahe hain ya cut-and-style ke liye? Uske hisaab se hi bhejungi.

  - id: salons_promote_offers_specificity
    goal: PROMOTE_OFFERS
    category: salons
    levers: [specificity, loss_aversion]
    cta_type: binary
    required_slots: [inventory_health]
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, you have no
        live offer right now{% if suggested_offer_title %} —
        {{ suggested_offer_title }} is usually the strongest walk-in
        magnet{% endif %}. Want me to activate it today?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, abhi koi live
        offer nahi hai{% if suggested_offer_title %} —
        {{ suggested_offer_title }} walk-ins laane mein sabse strong hota
        hai{% endif %}. Aaj activate kar doon?

  - id: salons_improve_listings_loss_aversion
    goal: IMPROVE_LISTINGS
    category: salons
    levers: [loss_aversion, specificity]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, your profile
        is {% if not verified %}unverified{% else %}missing
        {{ missing_fields | join(' and ') if missing_fields else 'a few details' }}{% endif %} —
        clients browsing salons nearby likely skip past it. Want me to fix
        it now?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, aapki
        profile {% if not verified %}unverified{% else %}
        {{ missing_fields | join(' aur ') if missing_fields else 'kuch details' }} mein
        incomplete{% endif %} hai — paas ke salons dhoondh rahe clients
        aise listings skip kar dete hain. Abhi theek kar doon?

  - id: salons_collect_reviews_social_proof
    goal: COLLECT_REVIEWS
    category: salons
    levers: [social_proof, reciprocity]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, your reviews
        are trending positive{% if top_review_theme %} — clients keep
        mentioning {{ top_review_theme }}{% endif %}. I've drafted a GBP
        post around that — want me to publish it?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, reviews
        positive trend mein hain{% if top_review_theme %} — clients baar
        baar {{ top_review_theme }} ka zikar karte hain{% endif %}. Maine
        ek GBP post taiyar kar diya hai — publish kar doon?

  - id: salons_increase_sales_specificity
    goal: INCREASE_SALES
    category: salons
    levers: [specificity, loss_aversion]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }},
        {% if trend_query %}'{{ trend_query }}' searches are up
        {{ trend_delta_yoy | pct }} in {{ city }}{% elif season_note %}
        {{ season_note }}{% elif festival_days_until %}bridal-season bookings
        pick up in the next {{ festival_days_until }} days{% elif views_delta_pct and views_delta_pct > 0 %}
        your profile views are already up
        {{ views_delta_pct | pct(signed=true) }} this month{% else %}your
        weekend slots typically fill fastest for {{ category_slug }} in
        {{ locality }}{% endif %} — salons without a fresh post tend to
        miss the window. Reply YES and I'll schedule one today.
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }},
        {% if trend_query %}'{{ trend_query }}' ki searches
        {{ trend_delta_yoy | pct }} badhi hain {{ city }} mein{% elif season_note %}
        {{ season_note }}{% elif festival_days_until %}agle
        {{ festival_days_until }} din mein bridal-season bookings
        badhti hain{% elif views_delta_pct and views_delta_pct > 0 %}
        aapke profile views is mahine
        {{ views_delta_pct | pct(signed=true) }} badh chuke hain{% else %}
        weekend slots {{ category_slug }} ke liye {{ locality }} mein sabse
        jaldi bhar jaate hain{% endif %} — bina fresh post ke salons yeh
        window miss kar dete hain. YES bolein, aaj hi post schedule kar deti
        hoon.

  - id: salons_increase_visibility_specificity
    goal: INCREASE_VISIBILITY
    category: salons
    levers: [specificity, social_proof]
    cta_type: open_ended
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if competitor_trigger %},
        a new salon just opened near {{ locality }}{% elif digest_title %},
        this week's trend: {{ digest_title }}{% if digest_source %}
        ({{ digest_source }}){% endif %}{% else %}, your profile views moved
        {{ views_delta_pct | pct(signed=true) }} this week{% endif %} — want
        the details{% if competitor_trigger %} on how your listing compares
        {% endif %}?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if competitor_trigger %},
        {{ locality }} ke paas ek naya salon khula hai{% elif digest_title %},
        is hafte ka trend: {{ digest_title }}{% if digest_source %}
        ({{ digest_source }}){% endif %}{% else %}, is hafte views
        {{ views_delta_pct | pct(signed=true) }} badle hain{% endif %} —
        details chahiye?
