# Category-specific templates — Dentists.
# Voice: peer_clinical / respectful_collegial (magicpin-ai-challenge/dataset/categories/dentists.json).
# salutation() already adds "Dr. " for this category; vocabulary here
# leans on the category's own vocab_allowed list (scaling, OPG, RCT,
# recall interval, caries, ...) and strictly avoids its vocab_taboo
# list (guaranteed, 100% safe, completely cure, miracle, best in city,
# doctor approved).
templates:
  - id: dentists_recover_revenue_loss_aversion
    goal: RECOVER_REVENUE
    category: dentists
    levers: [loss_aversion, specificity]
    cta_type: open_ended
    required_slots: [metric_label, metric_delta_pct]
    body:
      en: >-
        {{ salutation(owner_first_name, category_slug) }}, {{ metric_label }}
        is down {{ metric_delta_pct | abs_pct }} this week{% if peer_avg_ctr %} —
        peer clinics in {{ locality }} are converting profile views at
        {{ peer_avg_ctr | pct }}{% endif %}. Before it compounds into fewer
        chair bookings, want me to check what's driving it?
      hi_en: >-
        {{ salutation(owner_first_name, category_slug) }}, is hafte
        {{ metric_label }} {{ metric_delta_pct | abs_pct }} kam hua
        hai{% if peer_avg_ctr %} — {{ locality }} ke peer clinics
        {{ peer_avg_ctr | pct }} pe convert kar rahe hain{% endif %}. Chair
        bookings pe asar padne se pehle, wajah check kar loon?

  - id: dentists_win_back_customers_reciprocity
    goal: WIN_BACK_CUSTOMERS
    category: dentists
    levers: [reciprocity, loss_aversion]
    cta_type: binary
    required_slots: [customer_name]
    body:
      en: >-
        {{ salutation(owner_first_name, category_slug) }}, {{ customer_name }}
        is overdue for their recall visit{% if days_since_last_visit %}
        ({{ days_since_last_visit }} days since the last one){% endif %} —
        gaps like this raise caries risk. I've drafted a recall
        reminder{% if active_offer_title %} with your {{ active_offer_title }}
        offer{% endif %}; just say go and I'll send it.
      hi_en: >-
        {{ salutation(owner_first_name, category_slug) }}, {{ customer_name }}
        ka recall visit due hai{% if days_since_last_visit %}
        ({{ days_since_last_visit }} din ho gaye){% endif %} — itna gap
        caries risk badha sakta hai. Maine recall reminder taiyar kar diya
        hai{% if active_offer_title %} {{ active_offer_title }} offer ke
        saath{% endif %} — 'go' bolein, bhej deti hoon.

  - id: dentists_reduce_churn_asking_merchant
    goal: REDUCE_CHURN
    category: dentists
    levers: [asking_merchant, reciprocity]
    cta_type: open_ended
    required_slots: []
    body:
      en: >-
        {{ salutation(owner_first_name, category_slug) }}{% if days_since_last_touch %},
        it's been {{ days_since_last_touch }} days since we last
        spoke{% endif %} and I don't want to keep pinging without being
        useful — quick clinical question instead: is your patient mix
        leaning more cosmetic (aligners, whitening) or restorative (RCT,
        crowns) this month? I'll tailor what I send around that.
      hi_en: >-
        {{ salutation(owner_first_name, category_slug) }}{% if days_since_last_touch %},
        {{ days_since_last_touch }} din ho gaye baat kiye{% endif %}, aur
        bina kaam ki cheez ke ping nahi karna chahti — iske bajaye ek
        chhota clinical sawaal: is mahine patients zyada cosmetic
        (aligners, whitening) mein hain ya restorative (RCT, crowns) mein?
        Uske hisaab se hi bhejungi.

  - id: dentists_promote_offers_specificity
    goal: PROMOTE_OFFERS
    category: dentists
    levers: [specificity, loss_aversion]
    cta_type: binary
    required_slots: [inventory_health]
    body:
      en: >-
        {{ salutation(owner_first_name, category_slug) }}, you have no live
        offer right now{% if suggested_offer_title %} —
        {{ suggested_offer_title }} is usually the strongest new-patient
        entry point for a {{ category_slug }} practice{% endif %}. Want me
        to activate it today?
      hi_en: >-
        {{ salutation(owner_first_name, category_slug) }}, abhi koi live
        offer nahi hai{% if suggested_offer_title %} —
        {{ suggested_offer_title }} nayi patients laane ke liye sabse
        strong entry point hota hai{% endif %}. Aaj activate kar doon?

  - id: dentists_improve_listings_loss_aversion
    goal: IMPROVE_LISTINGS
    category: dentists
    levers: [loss_aversion, specificity]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        {{ salutation(owner_first_name, category_slug) }}, your profile is
        {% if not verified %}unverified{% else %}missing
        {{ missing_fields | join(' and ') if missing_fields else 'a few details' }}{% endif %} —
        patients searching for {{ category_slug }} nearby likely skip
        unverified listings. Want me to fix it now?
      hi_en: >-
        {{ salutation(owner_first_name, category_slug) }}, aapki profile
        {% if not verified %}unverified{% else %}
        {{ missing_fields | join(' aur ') if missing_fields else 'kuch details' }} mein
        incomplete{% endif %} hai — {{ category_slug }} dhoondh rahe patients
        aise listings skip kar dete hain. Abhi theek kar doon?

  - id: dentists_collect_reviews_social_proof
    goal: COLLECT_REVIEWS
    category: dentists
    levers: [social_proof, reciprocity]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        {{ salutation(owner_first_name, category_slug) }}, your reviews are
        trending positive{% if top_review_theme %} — patients keep
        mentioning {{ top_review_theme }}{% endif %}. I've drafted a GBP
        post around that — want me to publish it?
      hi_en: >-
        {{ salutation(owner_first_name, category_slug) }}, reviews positive
        trend mein hain{% if top_review_theme %} — patients baar baar
        {{ top_review_theme }} ka zikar karte hain{% endif %}. Maine ek GBP
        post taiyar kar diya hai — publish kar doon?

  - id: dentists_increase_sales_specificity
    goal: INCREASE_SALES
    category: dentists
    levers: [specificity, loss_aversion]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        {{ salutation(owner_first_name, category_slug) }},
        {% if trend_query %}'{{ trend_query }}' searches are up
        {{ trend_delta_yoy | pct }} in {{ city }}{% elif season_note %}
        {{ season_note }}{% elif festival_days_until %}exam-season and
        wedding-whitening bookings pick up in the next
        {{ festival_days_until }} days{% elif views_delta_pct and views_delta_pct > 0 %}
        your profile views are already up
        {{ views_delta_pct | pct(signed=true) }} this month{% else %}your
        weekend slots typically fill faster for {{ category_slug }} in
        {{ locality }}{% endif %} — clinics without a fresh post tend to miss
        the window. Reply YES and I'll schedule one today.
      hi_en: >-
        {{ salutation(owner_first_name, category_slug) }},
        {% if trend_query %}'{{ trend_query }}' ki searches
        {{ trend_delta_yoy | pct }} badhi hain {{ city }} mein{% elif season_note %}
        {{ season_note }}{% elif festival_days_until %}agle
        {{ festival_days_until }} din mein exam-season aur wedding-whitening
        bookings badhti hain{% elif views_delta_pct and views_delta_pct > 0 %}
        aapke profile views is mahine
        {{ views_delta_pct | pct(signed=true) }} badh chuke hain{% else %}
        weekend slots {{ category_slug }} ke liye {{ locality }} mein jaldi
        bhar jaate hain{% endif %} — bina fresh post ke clinics yeh window
        miss kar dete hain. YES bolein, aaj hi post schedule kar deti hoon.

  - id: dentists_increase_visibility_specificity
    goal: INCREASE_VISIBILITY
    category: dentists
    levers: [specificity, social_proof]
    cta_type: open_ended
    required_slots: []
    body:
      en: >-
        {{ salutation(owner_first_name, category_slug) }}{% if competitor_trigger %},
        a new {{ category_slug }} practice just opened near
        {{ locality }}{% elif digest_title %}, this week's clinical read:
        {{ digest_title }}{% if digest_source %}
        ({{ digest_source }}){% endif %}{% else %}, your profile views moved
        {{ views_delta_pct | pct(signed=true) }} this week{% endif %} — want
        the details{% if competitor_trigger %} on how your listing compares
        {% else %} so you can flag it for your high-risk patients{% endif %}?
      hi_en: >-
        {{ salutation(owner_first_name, category_slug) }}{% if competitor_trigger %},
        {{ locality }} ke paas ek nayi {{ category_slug }} practice khuli
        hai{% elif digest_title %}, is hafte ka clinical update:
        {{ digest_title }}{% if digest_source %}
        ({{ digest_source }}){% endif %}{% else %}, is hafte views
        {{ views_delta_pct | pct(signed=true) }} badle hain{% endif %} —
        details chahiye{% if competitor_trigger %} yeh dekhne ke liye ki
        aapki listing kaisi compare karti hai{% else %} high-risk patients
        ke liye flag karne ko{% endif %}?
