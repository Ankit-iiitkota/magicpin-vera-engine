# Category-specific templates — Pharmacies & Medical Stores.
# Voice: trustworthy_precise / neighbourhood_pharmacist (magicpin-ai-challenge/dataset/categories/pharmacies.json).
# Vocabulary from vocab_allowed (OTC, generic, MRP, expiry, refill, ...);
# avoids vocab_taboo (miracle cure, guaranteed result, 100% safe, doctor
# recommended without disclosure, best price without supporting data).
templates:
  - id: pharmacies_recover_revenue_specificity
    goal: RECOVER_REVENUE
    category: pharmacies
    levers: [specificity, loss_aversion]
    cta_type: open_ended
    required_slots: [metric_label, metric_delta_pct]
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, {{ metric_label }}
        is down {{ metric_delta_pct | abs_pct }} this week{% if peer_avg_ctr %} —
        peer pharmacies in {{ locality }} are converting profile views at
        {{ peer_avg_ctr | pct }}{% endif %}. Before it costs you repeat-Rx
        walk-ins, want me to check what's driving it?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, is hafte
        {{ metric_label }} {{ metric_delta_pct | abs_pct }} kam hua
        hai{% if peer_avg_ctr %} — {{ locality }} ke peer pharmacies
        {{ peer_avg_ctr | pct }} pe convert kar rahe hain{% endif %}.
        Repeat-Rx walk-ins pe asar padne se pehle, wajah check kar loon?

  - id: pharmacies_win_back_customers_reciprocity
    goal: WIN_BACK_CUSTOMERS
    category: pharmacies
    levers: [reciprocity, loss_aversion]
    cta_type: binary
    required_slots: [customer_name]
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, {{ customer_name }}
        hasn't refilled in a while{% if days_since_last_visit %}
        ({{ days_since_last_visit }} days){% endif %} — worth a nudge before
        they switch to another chemist for a chronic-Rx refill. I've
        drafted a reminder{% if active_offer_title %} with your
        {{ active_offer_title }} offer{% endif %} — just say go and I'll
        send it.
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, {{ customer_name }}
        ne kaafi din se refill nahi kiya{% if days_since_last_visit %}
        ({{ days_since_last_visit }} din){% endif %} — chronic-Rx refill ke
        liye kisi aur chemist na chale jaayein, isliye nudge zaroori hai.
        Maine reminder taiyar kar diya hai{% if active_offer_title %}
        {{ active_offer_title }} offer ke saath{% endif %} — 'go' bolein,
        bhej deti hoon.

  - id: pharmacies_reduce_churn_asking_merchant
    goal: REDUCE_CHURN
    category: pharmacies
    levers: [asking_merchant, reciprocity]
    cta_type: open_ended
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if days_since_last_touch %},
        it's been {{ days_since_last_touch }} days since we last
        spoke{% endif %} and I don't want to keep pinging without being
        useful — quick one instead: is your counter footfall leaning more
        OTC walk-ins or chronic-Rx refills this month? I'll tailor what I
        send around that.
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if days_since_last_touch %},
        {{ days_since_last_touch }} din ho gaye baat kiye{% endif %}, aur
        bina kaam ki cheez ke ping nahi karna chahti — iske bajaye ek
        chhota sawaal: is mahine counter footfall zyada OTC walk-ins se
        hai ya chronic-Rx refills se? Uske hisaab se hi bhejungi.

  - id: pharmacies_promote_offers_specificity
    goal: PROMOTE_OFFERS
    category: pharmacies
    levers: [specificity, loss_aversion]
    cta_type: binary
    required_slots: [inventory_health]
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, you have no
        live offer right now{% if suggested_offer_title %} —
        {{ suggested_offer_title }} is usually the strongest repeat-customer
        driver{% endif %}. Want me to activate it today?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, abhi koi
        live offer nahi hai{% if suggested_offer_title %} —
        {{ suggested_offer_title }} repeat-customers laane mein sabse
        strong hota hai{% endif %}. Aaj activate kar doon?

  - id: pharmacies_improve_listings_loss_aversion
    goal: IMPROVE_LISTINGS
    category: pharmacies
    levers: [loss_aversion, specificity]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, your profile
        is {% if not verified %}unverified{% else %}missing
        {{ missing_fields | join(' and ') if missing_fields else 'a few details' }}{% endif %} —
        customers searching for a nearby pharmacy likely skip past it.
        Want me to fix it now?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, aapki
        profile {% if not verified %}unverified{% else %}
        {{ missing_fields | join(' aur ') if missing_fields else 'kuch details' }} mein
        incomplete{% endif %} hai — paas ki pharmacy dhoondh rahe customers
        aise listings skip kar dete hain. Abhi theek kar doon?

  - id: pharmacies_collect_reviews_social_proof
    goal: COLLECT_REVIEWS
    category: pharmacies
    levers: [social_proof, reciprocity]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, your reviews
        are trending positive{% if top_review_theme %} — customers keep
        mentioning {{ top_review_theme }}{% endif %}. I've drafted a GBP
        post around that — want me to publish it?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}, reviews
        positive trend mein hain{% if top_review_theme %} — customers baar
        baar {{ top_review_theme }} ka zikar karte hain{% endif %}. Maine
        ek GBP post taiyar kar diya hai — publish kar doon?

  - id: pharmacies_increase_sales_specificity
    goal: INCREASE_SALES
    category: pharmacies
    levers: [specificity, loss_aversion]
    cta_type: binary
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }},
        {% if festival_days_until %}seasonal demand shifts in the next
        {{ festival_days_until }} days{% else %}your weekend counter
        footfall typically runs highest for {{ category_slug }} in
        {{ locality }}{% endif %} — pharmacies without a fresh post tend to
        miss the window. Want me to schedule one?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }},
        {% if festival_days_until %}agle {{ festival_days_until }} din mein
        seasonal demand shift hoti hai{% else %}weekend counter footfall
        {{ category_slug }} ke liye {{ locality }} mein sabse zyada hota
        hai{% endif %} — bina fresh post ke pharmacies yeh window miss kar
        dete hain. Ek post schedule kar doon?

  - id: pharmacies_increase_visibility_specificity
    goal: INCREASE_VISIBILITY
    category: pharmacies
    levers: [specificity, social_proof]
    cta_type: open_ended
    required_slots: []
    body:
      en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if digest_title %},
        this week's update: {{ digest_title }}{% if digest_source %}
        ({{ digest_source }}){% endif %}{% else %}, your profile views
        moved {{ views_delta_pct | pct(signed=true) }} this
        week{% endif %} — want the details?
      hi_en: >-
        Hi {{ salutation(owner_first_name, category_slug) }}{% if digest_title %},
        is hafte ka update: {{ digest_title }}{% if digest_source %}
        ({{ digest_source }}){% endif %}{% else %}, is hafte views
        {{ views_delta_pct | pct(signed=true) }} badle hain{% endif %} —
        details chahiye?
